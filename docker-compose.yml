services:
  postgres:
    image: postgres:16-alpine
    container_name: dms_postgres
    environment:
      POSTGRES_DB: dms
      POSTGRES_USER: dms
      POSTGRES_PASSWORD: dms_dev_password
      POSTGRES_INITDB_ARGS: "--encoding=UTF8 --locale=C"
    ports:
      - "5432:5432"
    volumes:
      - dms_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dms -d dms"]
      interval: 5s
      timeout: 3s
      retries: 30
    command:
      - "postgres"
      - "-c"
      - "max_connections=50"
      - "-c"
      - "shared_buffers=256MB"
      - "-c"
      - "effective_cache_size=512MB"
      - "-c"
      - "work_mem=4MB"
      - "-c"
      - "maintenance_work_mem=64MB"
      - "-c"
      - "wal_compression=on"
      - "-c"
      - "checkpoint_timeout=15min"
      - "-c"
      - "max_wal_size=1GB"
      - "-c"
      - "min_wal_size=128MB"
      - "-c"
      - "log_min_duration_statement=500ms"

volumes:
  dms_pgdata:
