<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DMS - Quick Login Test</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 min-h-screen flex items-center justify-center">
    <div class="bg-white p-8 rounded-lg shadow-lg max-w-md w-full">
        <h1 class="text-2xl font-bold text-center mb-6 text-blue-600">Dialysis Management System</h1>

        <form id="loginForm" class="space-y-4">
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-2">Email</label>
                <input type="email" id="email" value="doctor@demo.com" required
                    class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent">
            </div>

            <div>
                <label class="block text-sm font-medium text-gray-700 mb-2">Password</label>
                <input type="password" id="password" value="password123" required
                    class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent">
            </div>

            <button type="submit" id="loginBtn"
                class="w-full bg-blue-600 text-white py-2 px-4 rounded-lg hover:bg-blue-700 transition">
                Sign In
            </button>
        </form>

        <div id="message" class="mt-4 p-4 rounded-lg hidden"></div>

        <div id="dashboard" class="mt-6 hidden">
            <h2 class="text-xl font-bold mb-4 text-green-600">✓ Login Successful!</h2>
            <div class="bg-gray-50 p-4 rounded-lg">
                <p class="text-sm text-gray-600 mb-2">Welcome back!</p>
                <p class="font-medium" id="userName"></p>
                <p class="text-sm text-gray-500" id="userEmail"></p>
                <button onclick="logout()" class="mt-4 w-full bg-red-500 text-white py-2 px-4 rounded-lg hover:bg-red-600">
                    Logout
                </button>
            </div>
        </div>
    </div>

    <script>
        const API_URL = 'http://localhost:8080/api/v1';

        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();

            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const messageDiv = document.getElementById('message');
            const loginBtn = document.getElementById('loginBtn');

            loginBtn.textContent = 'Signing in...';
            loginBtn.disabled = true;
            messageDiv.className = 'mt-4 p-4 rounded-lg hidden';

            try {
                const response = await fetch(`${API_URL}/auth/login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password })
                });

                const data = await response.json();

                if (response.ok) {
                    // Success
                    localStorage.setItem('token', data.token);
                    localStorage.setItem('user', JSON.stringify(data.user));

                    document.getElementById('userName').textContent = data.user.full_name;
                    document.getElementById('userEmail').textContent = data.user.email;

                    document.getElementById('loginForm').style.display = 'none';
                    document.getElementById('dashboard').classList.remove('hidden');

                    messageDiv.textContent = '✓ Login successful!';
                    messageDiv.className = 'mt-4 p-4 rounded-lg bg-green-100 text-green-700';
                    messageDiv.classList.remove('hidden');
                } else {
                    throw new Error(data.error || 'Login failed');
                }
            } catch (error) {
                messageDiv.textContent = '✗ ' + error.message;
                messageDiv.className = 'mt-4 p-4 rounded-lg bg-red-100 text-red-700';
                messageDiv.classList.remove('hidden');
            } finally {
                loginBtn.textContent = 'Sign In';
                loginBtn.disabled = false;
            }
        });

        function logout() {
            localStorage.clear();
            location.reload();
        }

        // Check if already logged in
        window.addEventListener('load', () => {
            const token = localStorage.getItem('token');
            const user = localStorage.getItem('user');

            if (token && user) {
                const userData = JSON.parse(user);
                document.getElementById('userName').textContent = userData.full_name;
                document.getElementById('userEmail').textContent = userData.email;
                document.getElementById('loginForm').style.display = 'none';
                document.getElementById('dashboard').classList.remove('hidden');
            }
        });
    </script>
</body>
</html>
